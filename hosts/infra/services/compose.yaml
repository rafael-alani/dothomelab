name: infra-services

x-wud-labels: &wud-labels
  wud.watch: "true"
  wud.watch.digest: "true"
  wud.trigger.include: "docker.backupgated"

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    hostname: pihole
    restart: unless-stopped
    labels: *wud-labels
    environment:
      TZ: "${TZ:-Europe/Amsterdam}"
      FTLCONF_dns_listeningMode: "all"
      FTLCONF_misc_etc_dnsmasq_d: "true"
      # CT110 already has a time source; Pi-hole still serves NTP on .100.
      FTLCONF_ntp_sync_active: "false"
    ports:
      - "${PIHOLE_BIND_ADDRESS:-192.168.0.100}:${PIHOLE_DNS_PORT:-53}:53/tcp"
      - "${PIHOLE_BIND_ADDRESS:-192.168.0.100}:${PIHOLE_DNS_PORT:-53}:53/udp"
      - "${PIHOLE_BIND_ADDRESS:-192.168.0.100}:${PIHOLE_NTP_PORT:-123}:123/udp"
      - "192.168.0.110:8080:80/tcp"
    volumes:
      - /srv/appdata/docker/pihole/etc-pihole:/etc/pihole
      - /srv/appdata/docker/pihole/etc-dnsmasq.d:/etc/dnsmasq.d

  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    labels: *wud-labels
    environment:
      TZ: "${TZ:-Europe/Amsterdam}"
      SECRET_ENCRYPTION_KEY: "${HOMARR_SECRET_ENCRYPTION_KEY:?set HOMARR_SECRET_ENCRYPTION_KEY in /root/.env on Proxmox}"
    ports:
      - "192.168.0.110:7575:7575/tcp"
    volumes:
      - /srv/appdata/docker/homarr:/appdata
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:7575').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      start_period: 30s
      timeout: 5s
      interval: 30s
      retries: 3

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    network_mode: host
    labels: *wud-labels
    volumes:
      - /srv/appdata/docker/infra-nginx-proxy-manager/data:/data
      - /srv/appdata/docker/infra-nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail http://127.0.0.1:81/api/ >/dev/null || exit 1
      start_period: 5m
      timeout: 5s
      interval: 30s
      retries: 3

  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    restart: unless-stopped
    user: "1000:1000"
    labels: *wud-labels
    environment:
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN:?set CLOUDFLARE_API_TOKEN in /root/.env on Proxmox}"
      DOMAINS: "${DOMAINS:?set DOMAINS in /root/.env on Proxmox}"
      PROXIED: "${PROXIED:?set PROXIED in /root/.env on Proxmox}"
      IP6_PROVIDER: "${IP6_PROVIDER:?set IP6_PROVIDER in /root/.env on Proxmox}"

  helloworld:
    image: karthequian/helloworld:latest
    container_name: helloworld
    restart: unless-stopped
    labels: *wud-labels
    ports:
      - "192.168.0.110:8888:80/tcp"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/ || exit 1
      start_period: 10s
      timeout: 5s
      interval: 30s
      retries: 3

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    labels: *wud-labels
    ports:
      - "192.168.0.110:8000:8000/tcp"
      - "192.168.0.110:9443:9443/tcp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/appdata/docker/infra-portainer:/data

  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer_agent
    restart: always
    labels: *wud-labels
    ports:
      - "192.168.0.110:9001:9001/tcp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes:rslave
      - /:/host:rslave
