[global]
	workgroup = WORKGROUP
	server string = dothomelab infra
	server role = standalone server
	security = user
	map to guest = Never
	passdb backend = tdbsam
	server min protocol = SMB2_10
	smb ports = 445
	disable netbios = Yes
	interfaces = lo eth0
	bind interfaces only = Yes
	hosts allow = 127.0.0.1 192.168.0.0/24
	hosts deny = 0.0.0.0/0
	load printers = No
	printing = bsd
	printcap name = /dev/null
	fruit:aapl = Yes
	fruit:nfs_aces = No
	ea support = Yes
	log file = /var/log/samba/log.%m
	max log size = 1000
	logging = file

[Vault]
	comment = Vault shared data
	path = /vault/shared
	valid users = afa
	guest ok = No
	read only = No
	browseable = Yes
	hide unreadable = Yes
	veto files = /.ssh/.gnupg/.env/compose/
	delete veto files = No
	inherit permissions = Yes
	vfs objects = catia fruit streams_xattr
	fruit:encoding = native
	fruit:metadata = stream
	fruit:resource = xattr
	fruit:zero_file_id = Yes
	fruit:nfs_aces = No
	ea support = Yes

[Media]
	comment = Media library
	path = /vault/shared/media
	valid users = afa
	guest ok = No
	read only = No
	browseable = Yes
	hide unreadable = Yes
	veto files = /.ssh/.gnupg/.env/compose/
	delete veto files = No
	inherit permissions = Yes
	vfs objects = catia fruit streams_xattr
	fruit:encoding = native
	fruit:metadata = stream
	fruit:resource = xattr
	fruit:zero_file_id = Yes
	fruit:nfs_aces = No
	ea support = Yes
