name: immich-migration

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v1.124.2@sha256:c14dccad0611635668abf98f17ce87c3badcc17bb979c53ef96dc49e934ebbc8
    container_name: immich_migration_server
    restart: unless-stopped
    labels:
      wud.watch: "false"
    environment:
      DB_DATABASE_NAME: "${IMMICH_DB_DATABASE_NAME}"
      DB_USERNAME: "${IMMICH_DB_USERNAME}"
      DB_PASSWORD: "${IMMICH_DB_PASSWORD}"
      DB_DATA_LOCATION: "${IMMICH_DB_DATA_LOCATION}"
      UPLOAD_LOCATION: "${IMMICH_UPLOAD_LOCATION}"
    ports:
      - "2283:2283"
    volumes:
      - "${IMMICH_UPLOAD_LOCATION}:/usr/src/app/upload"
      - "${IMMICH_EXTERNAL_LIBRARY_LOCATION}:/old-photos:ro"
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    healthcheck:
      disable: false

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v1.124.2@sha256:a134652b47278edfdac3187d61558e78679be39c810536193a41e9e0d894c5f4
    container_name: immich_migration_machine_learning
    restart: unless-stopped
    labels:
      wud.watch: "false"
    environment:
      DB_DATABASE_NAME: "${IMMICH_DB_DATABASE_NAME}"
      DB_USERNAME: "${IMMICH_DB_USERNAME}"
      DB_PASSWORD: "${IMMICH_DB_PASSWORD}"
      DB_DATA_LOCATION: "${IMMICH_DB_DATA_LOCATION}"
      UPLOAD_LOCATION: "${IMMICH_UPLOAD_LOCATION}"
    volumes:
      - /srv/appdata/docker/immich/model-cache:/cache
    healthcheck:
      disable: false

  redis:
    image: docker.io/redis:6.2-alpine@sha256:eaba718fecd1196d88533de7ba49bf903ad33664a92debb24660a922ecd9cac8
    container_name: immich_migration_redis
    restart: unless-stopped
    labels:
      wud.watch: "false"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    container_name: immich_migration_postgres
    restart: unless-stopped
    labels:
      wud.watch: "false"
    environment:
      POSTGRES_PASSWORD: "${IMMICH_DB_PASSWORD}"
      POSTGRES_USER: "${IMMICH_DB_USERNAME}"
      POSTGRES_DB: "${IMMICH_DB_DATABASE_NAME}"
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - "${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" || exit 1;
          Chksum="$$(psql --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}"
          --tuples-only --no-align
          --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')";
          echo "checksum failure count is $$Chksum";
          [ "$$Chksum" = "0" ] || exit 1
      interval: 30s
      start_interval: 5s
      start_period: 5m
      timeout: 10s
      retries: 5
    command:
      - postgres
      - -c
      - shared_preload_libraries=vectors.so
      - -c
      - search_path="$$user", public, vectors
      - -c
      - logging_collector=on
      - -c
      - max_wal_size=2GB
      - -c
      - shared_buffers=512MB
      - -c
      - wal_compression=on
