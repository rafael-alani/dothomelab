name: immich-migration

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich_migration_server
    restart: unless-stopped
    labels:
      wud.watch: "false"
    environment:
      DB_DATABASE_NAME: "${IMMICH_DB_DATABASE_NAME}"
      DB_USERNAME: "${IMMICH_DB_USERNAME}"
      DB_PASSWORD: "${IMMICH_DB_PASSWORD}"
      DB_DATA_LOCATION: "${IMMICH_DB_DATA_LOCATION}"
      UPLOAD_LOCATION: "${IMMICH_UPLOAD_LOCATION}"
    ports:
      - "2283:2283"
    volumes:
      - "${IMMICH_UPLOAD_LOCATION}:/data"
      - "${IMMICH_EXTERNAL_LIBRARY_LOCATION}:/old-photos:ro"
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    healthcheck:
      disable: false

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich_migration_machine_learning
    restart: unless-stopped
    labels:
      wud.watch: "false"
    environment:
      DB_DATABASE_NAME: "${IMMICH_DB_DATABASE_NAME}"
      DB_USERNAME: "${IMMICH_DB_USERNAME}"
      DB_PASSWORD: "${IMMICH_DB_PASSWORD}"
      DB_DATA_LOCATION: "${IMMICH_DB_DATA_LOCATION}"
      UPLOAD_LOCATION: "${IMMICH_UPLOAD_LOCATION}"
    volumes:
      - /srv/appdata/docker/immich/model-cache:/cache
    healthcheck:
      disable: false

  redis:
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    container_name: immich_migration_redis
    restart: unless-stopped
    labels:
      wud.watch: "false"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich_migration_postgres
    restart: unless-stopped
    labels:
      wud.watch: "false"
    environment:
      POSTGRES_PASSWORD: "${IMMICH_DB_PASSWORD}"
      POSTGRES_USER: "${IMMICH_DB_USERNAME}"
      POSTGRES_DB: "${IMMICH_DB_DATABASE_NAME}"
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - "${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data"
    shm_size: 128mb
    healthcheck:
      disable: false
