name: immich-migration

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v1.143.1
    container_name: immich_migration_server
    restart: unless-stopped
    labels:
      wud.watch: "false"
    environment:
      DB_DATABASE_NAME: "${IMMICH_DB_DATABASE_NAME}"
      DB_USERNAME: "${IMMICH_DB_USERNAME}"
      DB_PASSWORD: "${IMMICH_DB_PASSWORD}"
      DB_DATA_LOCATION: "${IMMICH_DB_DATA_LOCATION}"
      UPLOAD_LOCATION: "${IMMICH_UPLOAD_LOCATION}"
    ports:
      - "2283:2283"
    volumes:
      - "${IMMICH_UPLOAD_LOCATION}:/data"
      - "${IMMICH_EXTERNAL_LIBRARY_LOCATION}:/old-photos:ro"
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    healthcheck:
      disable: false

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v1.143.1
    container_name: immich_migration_machine_learning
    restart: unless-stopped
    labels:
      wud.watch: "false"
    environment:
      DB_DATABASE_NAME: "${IMMICH_DB_DATABASE_NAME}"
      DB_USERNAME: "${IMMICH_DB_USERNAME}"
      DB_PASSWORD: "${IMMICH_DB_PASSWORD}"
      DB_DATA_LOCATION: "${IMMICH_DB_DATA_LOCATION}"
      UPLOAD_LOCATION: "${IMMICH_UPLOAD_LOCATION}"
    volumes:
      - /srv/appdata/docker/immich/model-cache:/cache
    healthcheck:
      disable: false

  redis:
    image: docker.io/valkey/valkey:8-bookworm@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571
    container_name: immich_migration_redis
    restart: unless-stopped
    labels:
      wud.watch: "false"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:c44be5f2871c59362966d71eab4268170eb6f5653c0e6170184e72b38ffdf107
    container_name: immich_migration_postgres
    restart: unless-stopped
    labels:
      wud.watch: "false"
    environment:
      POSTGRES_PASSWORD: "${IMMICH_DB_PASSWORD}"
      POSTGRES_USER: "${IMMICH_DB_USERNAME}"
      POSTGRES_DB: "${IMMICH_DB_DATABASE_NAME}"
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - "${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data"
    shm_size: 128mb
