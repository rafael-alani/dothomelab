name: media

x-wud-labels: &wud-labels
  wud.watch: "true"
  wud.watch.digest: "true"
  wud.trigger.include: "docker.backupgated"

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    labels: *wud-labels
    environment:
      TZ: "${TZ:-Europe/Amsterdam}"
    ports:
      - "8096:8096/tcp"
      - "7359:7359/udp"
    group_add:
      - "44"
      - "104"
    devices:
      - /dev/dri/card1:/dev/dri/card1
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - /srv/appdata/docker/jellyfin/config:/config
      - /srv/appdata/docker/jellyfin/cache:/cache
      - type: bind
        source: /data/media
        target: /media
        read_only: true

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    restart: unless-stopped
    labels: *wud-labels
    environment:
      LOG_LEVEL: info
      TZ: "${TZ:-Europe/Amsterdam}"
      PORT: "5055"
    ports:
      - "5055:5055/tcp"
    volumes:
      - /srv/appdata/docker/seerr/config:/app/config
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

  jellystat-db:
    image: postgres:18
    container_name: jellystat-db
    restart: unless-stopped
    shm_size: 1gb
    labels:
      wud.watch: "false"
    environment:
      POSTGRES_DB: jfstat
      POSTGRES_USER: jellystat
      POSTGRES_PASSWORD: "${JELLYSTAT_POSTGRES_PASSWORD:?set JELLYSTAT_POSTGRES_PASSWORD in /root/.env on Proxmox}"
    volumes:
      - /srv/appdata/docker/jellystat/postgres:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --dbname=jfstat --username=jellystat
      start_period: 20s
      timeout: 5s
      interval: 10s
      retries: 10

  jellystat:
    image: cyfershepard/jellystat:latest
    container_name: jellystat
    restart: unless-stopped
    labels: *wud-labels
    environment:
      POSTGRES_DB: jfstat
      POSTGRES_USER: jellystat
      POSTGRES_PASSWORD: "${JELLYSTAT_POSTGRES_PASSWORD:?set JELLYSTAT_POSTGRES_PASSWORD in /root/.env on Proxmox}"
      POSTGRES_IP: jellystat-db
      POSTGRES_PORT: "5432"
      JWT_SECRET: "${JELLYSTAT_JWT_SECRET:?set JELLYSTAT_JWT_SECRET in /root/.env on Proxmox}"
      TZ: "${TZ:-Europe/Amsterdam}"
    ports:
      - "192.168.0.112:3000:3000/tcp"
    volumes:
      - /srv/appdata/docker/jellystat/backup-data:/app/backend/backup-data
    depends_on:
      jellystat-db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/auth/isConfigured || exit 1
      start_period: 30s
      timeout: 10s
      interval: 30s
      retries: 5
